<!DOCTYPE html>
<html data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <title>LPQ 建模系统</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <!-- 新增：引入 RemixIcon 图标库 -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      MathJax = {
        tex: {
          inlineMath: [
            ["$", "$"],
            ["\\(", "\\)"],
          ],
        },
      };
    </script>
    <script
      id="MathJax-script"
      async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    ></script>
    <style>
      @font-face {
        font-family: "MiSans";
        src: url("assets/fonts/MiSans-Light.woff2") format("woff2");
      }
      body {
        font-family: "MiSans", sans-serif;
        background-color: #f0f2f5;
        font-weight: 500;
      }
      .panel-border {
        border: 2px solid #333;
        box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.1);
      }
      .input-cell {
        border: none;
        background: transparent;
        text-align: center;
        width: 100%;
        height: 100%;
      }
      .input-cell:focus {
        outline: 2px solid #007bff;
        background: #fff;
      }
      .eng-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      .eng-table th,
      .eng-table td {
        border: 1px solid #666;
        padding: 0;
        height: 32px;
      }
      .eng-table th {
        background-color: #f0f0f0;
        font-weight: bold;
        padding: 4px;
      }
      .eng-table input {
        width: 100%;
        height: 100%;
        border: none;
        text-align: center;
        background: transparent;
        font-family: inherit;
      }
      .eng-table input:focus {
        background-color: #e6f7ff;
        outline: 2px solid #1890ff;
        outline-offset: -2px;
      }
      .header-group {
        border-bottom: 1px solid #666;
      }
      #math-preview {
        font-size: 0.85rem;
        padding: 10px;
        overflow-x: auto;
      }
      .eng-table input,
      .eng-table select {
        font-family: "MiSans", sans-serif;
      }
    </style>
  </head>
  <body class="h-screen flex flex-col p-4 overflow-hidden">
    <div class="navbar bg-white panel-border mb-4 min-h-12">
      <div class="flex-1">
        <a class="btn btn-ghost text-xl font-bold">LPQ 分布式建模系统</a>
      </div>
      <div class="flex-none gap-2"></div>
    </div>
    <div class="flex-1 grid grid-cols-12 gap-4 overflow-hidden">
      <div class="col-span-3 bg-white panel-border flex flex-col">
        <div class="bg-gray-100 p-2 border-b-2 border-gray-300 font-bold">
          问题描述
        </div>
        <div class="p-4 flex-1 flex flex-col gap-4">
          <textarea
            class="textarea textarea-bordered h-full w-full resize-none text-sm leading-relaxed"
            placeholder="在此输入线性规划问题的自然语言描述。
例如：
某工厂生产两种产品 A 和 B，需要消耗资源...

系统将尝试自动解析约束条件与目标函数。"
          ></textarea>
          <button class="btn btn-neutral w-full">智能识别模型</button>
        </div>
      </div>
      <div
        class="col-span-6 bg-white panel-border flex flex-col overflow-hidden"
      >
        <div
          class="bg-gray-100 p-2 border-b-2 border-gray-300 font-bold flex justify-between items-center"
        >
          <span>建模参数</span>
          <div class="flex gap-2 items-center text-sm font-normal">
            <span>目标:</span>
            <label class="cursor-pointer label p-0 gap-1">
              <input
                type="radio"
                name="objType"
                value="Max"
                class="radio radio-xs"
                checked
                onclick="updatePreview()"
              />
              Max
            </label>
            <label class="cursor-pointer label p-0 gap-1">
              <input
                type="radio"
                name="objType"
                value="Min"
                class="radio radio-xs"
                onclick="updatePreview()"
              />
              Min
            </label>
          </div>
        </div>
        <div class="p-4 flex-1 overflow-y-auto space-y-4">
          <div class="flex gap-4 items-end border-b pb-4">
            <div class="form-control w-24">
              <label class="label-text text-xs mb-1">变量数</label>
              <input
                type="number"
                id="numVars"
                value="2"
                min="1"
                max="10"
                class="input input-bordered input-sm"
                onchange="generateTable()"
              />
            </div>
            <div class="form-control w-24">
              <label class="label-text text-xs mb-1">约束数</label>
              <input
                type="number"
                id="numCons"
                value="2"
                min="1"
                max="10"
                class="input input-bordered input-sm"
                onchange="generateTable()"
              />
            </div>
            <button onclick="generateTable()" class="btn btn-sm btn-primary">
              重置表格
            </button>
          </div>
          <div class="overflow-x-auto border border-gray-300 rounded">
            <table class="table table-xs table-pin-rows">
              <thead>
                <tr class="bg-gray-100" id="table-header"></tr>
              </thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
        </div>
        <div
          class="h-48 border-t-2 border-gray-300 bg-gray-50 p-4 flex flex-col"
        >
          <div class="flex justify-between items-center mb-2">
            <span class="font-bold text-gray-600">数学模型预览</span>
            <button onclick="solve()" class="btn btn-sm btn-accent text-white">
              计算求解
            </button>
          </div>
          <div
            id="math-preview"
            class="flex-1 overflow-auto flex items-center justify-center text-lg"
          ></div>
        </div>
      </div>
      <div class="col-span-3 bg-white panel-border flex flex-col">
        <div class="bg-gray-100 p-2 border-b-2 border-gray-300 font-bold">
          规划方案
        </div>
        <div
          id="result-panel"
          class="p-4 flex-1 overflow-y-auto flex flex-col items-center justify-center text-gray-400"
        >
          <div class="text-center space-y-2">
            <div class="mb-2 opacity-20">
              <i class="ri-bar-chart-box-line text-6xl"></i>
            </div>
            <div class="font-medium text-gray-500">暂无计算结果</div>
            <div class="text-xs opacity-70">请配置参数并点击“计算求解”</div>
          </div>
        </div>
      </div>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
